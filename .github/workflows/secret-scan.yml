name: Secret Scan

on:
  push:
    branches: [main, og]
  pull_request:
    branches: [main]
  workflow_dispatch: # manual trigger scans full history

jobs:
  phantom-scan:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history for complete scan

      - uses: cachix/install-nix-action@v27

      - name: Run Phantom leak scan
        run: |
          bash scripts/phantom-scan-check.sh .
